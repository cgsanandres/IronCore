<!DOCTYPE html>
<html>
<head>
<title>IronCore Fitness | Account</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
font-family:Arial;
box-sizing:border-box;
}

body{
margin:0;
display:flex;
background:#111;
color:white;
transition:0.3s;
}

/* LIGHT MODE */
body.light{
background:#f4f4f4;
color:#111;
}

/* SIDEBAR */

.sidebar{
width:220px;
background:#1c1c1c;
height:100vh;
padding:20px;
display:flex;
flex-direction:column;
}

body.light .sidebar{
background:white;
}

.sidebar h2{
color:#f5c518;
text-align:center;
margin-bottom:25px;
}

.sidebar a{
text-decoration:none;
color:inherit;
margin:10px 0;
cursor:pointer;
}

.sidebar a:hover{
color:#f5c518;
}

/* MAIN */

.main{
flex:1;
padding:40px;
}

/* PROFILE CARD */

.profile{
display:flex;
align-items:center;
gap:20px;
background:#1c1c1c;
padding:25px;
border-radius:10px;
margin-bottom:30px;
}

body.light .profile{
background:white;
}

.profile img{
width:90px;
height:90px;
border-radius:50%;
border:3px solid #f5c518;
}

.profile h2{
margin:0;
color:#f5c518;
}

/* STATS GRID */

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
background:#1c1c1c;
padding:25px;
border-radius:10px;
text-align:center;
}

body.light .card{
background:white;
}

.card h3{
margin:0;
color:#f5c518;
}

.card p{
font-size:22px;
margin:10px 0 0 0;
}

/* ACTION BUTTONS */

.actions{
display:flex;
gap:20px;
flex-wrap:wrap;
}

.btn{
background:#f5c518;
border:none;
padding:12px 20px;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

.btn:hover{
opacity:0.9;
}

.logout{
background:#e63946;
color:white;
}

</style>
</head>

<body>

<div class="sidebar">

<h2>IronCore</h2>

<a href="indax.html">🏠 Home</a>
<a href="classes.html">🏋️ Classes</a>
<a href="trainers.html">👤 Trainers</a>
<a href="membership.html">💳 Membership</a>
<a href="gallary.html">📸 Gallery</a>
<a href="about.html">ℹ About</a>
<a href="contect.html">📞 Contact</a>


</div>

<div class="main">

<h1>Account Dashboard</h1>

<!-- PROFILE -->
<div class="profile">

<img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">

<div>
<h2 id="userEmail"></h2>
<p>IronCore Member</p>
</div>

</div>

<!-- MEMBER STATS -->

<div class="stats">

<div class="card">
<h3>Membership</h3>
<p>Active</p>
</div>

<div class="card">
<h3>Workout Plan</h3>
<p>Strength</p>
</div>

<div class="card">
<h3>Classes Joined</h3>
<p>12</p>
</div>

<div class="card">
<h3>Trainer</h3>
<p>Assigned</p>
</div>

</div>

<!-- QUICK ACTIONS -->

<div class="actions">

<button class="btn">View Membership</button>

<button class="btn">Book Class</button>

<button class="btn">Edit Profile</button>

<button class="btn logout" onclick="logout()">Logout</button>

</div>

</div>

<script>

/* LOGIN CHECK */

if(localStorage.getItem("fitnessLoggedIn")!=="true"){
window.location.href="fitnesslog.html";
}

/* DISPLAY EMAIL */

document.getElementById("userEmail").innerText =
localStorage.getItem("fitnessEmail");


/* LOGOUT */

function logout(){
localStorage.removeItem("fitnessLoggedIn");
window.location.href="fitnesslog.html";
}

</script>

</body>
</html>
