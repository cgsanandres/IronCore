<!DOCTYPE html>
<html>
<head>
<title>IronCore Fitness | Create Account</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { box-sizing: border-box; font-family: Arial, sans-serif; }

body {
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#111;
    color:white;
    transition:0.3s;
}

body.light {
    background:#f4f4f4;
    color:#111;
}

.container {
    background:#1c1c1c;
    padding:40px;
    width:350px;
    border-radius:10px;
    box-shadow:0 0 20px rgba(255,0,0,0.3);
    transition:0.3s;
}

body.light .container {
    background:white;
    box-shadow:0 0 20px rgba(0,0,0,0.1);
}

h1 {
    text-align:center;
    color:#f5c518;
}

input {
    width:100%;
    padding:10px;
    margin:10px 0;
    border:none;
    border-radius:5px;
}

button {
    width:100%;
    padding:10px;
    background:#f5c518;
    border:none;
    color:white;
    cursor:pointer;
    border-radius:5px;
}

button:hover {
    opacity:0.9;
}

.error {
    color:red;
    font-size:13px;
    text-align:center;
}

.success {
    color:lightgreen;
    font-size:13px;
    text-align:center;
}

.link {
    text-align:center;
    margin-top:15px;
    font-size:14px;
}

.link a {
    color:#e10600;
    text-decoration:none;
}

.toggle {
    margin-top:10px;
    text-align:center;
    cursor:pointer;
    font-size:14px;
}
</style>
</head>

<body>

<div class="container">
    <h1>IronCore</h1>
    <h3 style="text-align:center;">Create Account</h3>

    <input type="email" id="email" placeholder="Enter Email">
    <input type="password" id="password" placeholder="Create Password">
    <input type="password" id="confirmPassword" placeholder="Confirm Password">

    <button onclick="createAccount()">Create Account</button>

    <div class="error" id="errorMsg"></div>
    <div class="success" id="successMsg"></div>

    <div class="link">
        Already have an account? 
        <a href="fitnesslog.html">Login</a>
    </div>

    <div class="toggle" onclick="toggleTheme()">
        🌗 Toggle Dark/Light Mode
    </div>
</div>

<script>
// Load saved theme
if(localStorage.getItem("theme") === "light"){
    document.body.classList.add("light");
}

function toggleTheme(){
    document.body.classList.toggle("light");
    if(document.body.classList.contains("light")){
        localStorage.setItem("theme","light");
    } else {
        localStorage.setItem("theme","dark");
    }
}

function createAccount(){
    var email = document.getElementById("email").value;
    var password = document.getElementById("password").value;
    var confirmPassword = document.getElementById("confirmPassword").value;

    if(email === "" || password === "" || confirmPassword === ""){
        document.getElementById("errorMsg").innerText = "Please fill in all fields.";
        return;
    }

    if(password !== confirmPassword){
        document.getElementById("errorMsg").innerText = "Passwords do not match.";
        return;
    }

    localStorage.setItem("fitnessEmail", email);
    localStorage.setItem("fitnessPassword", password);

    document.getElementById("errorMsg").innerText = "";
    document.getElementById("successMsg").innerText = "Account created successfully! Redirecting...";

    setTimeout(function(){
        window.location.href = "fitnesslog.html";
    }, 1500);
}
</script>

</body>
</html>
